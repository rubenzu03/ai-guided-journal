{% extends "base.html" %} {% load static %} {% block title %}Sign up - AI Guided
Journal{% endblock %} {% block content %}
<link rel="stylesheet" href="{% static 'journal/css/registration/login.css' %}" />
<div class="signup-container">
  <h2>Create an account</h2>
  <form method="post">
    {% csrf_token %} {{ form.as_p }}
    <button type="submit" class="button">Sign up</button>
  </form>
  <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</div>
{% endblock %}
